name: Extract and Push

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip plugin
        run: unzip VulkanMod-0.6.0.zip -d extracted

      - name: Check extracted folder
        run: ls extracted/

      - name: Move files to root
        run: |
          FOLDER=$(ls extracted/ | head -1)
          cp -r extracted/$FOLDER/. .
          rm -rf extracted

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract plugin structure"
          git push

          
